name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Tests + coverage
        run: pytest --cov=lesson_loom --cov-report=term-missing
      - name: Self-improvement smoke (offline, zero API keys)
        run: |
          lesson-loom optimize --subject science --rounds 8 --db /tmp/ci.sqlite --report /tmp/REPORT.md
          lesson-loom optimize --subject history --rounds 8 --db /tmp/ci.sqlite --report /tmp/REPORT.md
